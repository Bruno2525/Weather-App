<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Weather App</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <h1>🌦 Weather App</h1>
        <p class="subtitle">Consulte o clima da sua cidade</p>
    <div class="search">
        <input type="text" id="cityInput" placeholder="Digite uma cidade">
        <button onclick="getWeather()">Buscar</button>
    </div>
    <div class="weather-result">
    <h2 id="cityName"></h2>
    <p id="temperature"></p>
    <p id="humidity"></p>
    <p id="wind"></p>
    <p id="time"></p>
    <p id="weatherType"></p>
    <p id="loading"></p>
</div>
    </div>
    <script src="script.js"></script>    
</body>

</html>
